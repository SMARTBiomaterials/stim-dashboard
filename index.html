<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skin Cell Stimulation — Dashboard</title>

<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self';
  style-src 'self';
  font-src 'self';
  img-src 'self' data:;
  connect-src 'self';
  object-src 'none';
  base-uri 'self';
">
<link rel="stylesheet" href="./assets/css/style.css">
<link rel="stylesheet" href="./assets/css/dashboard.css">
<link rel="stylesheet" href="./assets/css/fonts.css">

<script src="./assets/js/d3.min.js" defer></script>
<script src="./assets/js/app.js" defer></script>
</head>

<body class="dashboard">

<header class="header">
  <div>
    <h1>Skin Cell <span>Stimulation</span></h1>
    <p>Mechanical & Electrical · Fibroblasts & Keratinocytes</p>
  </div>

  <div id="header-stats"></div>

  <button id="theme-btn" type="button">☀︎ Light</button>
</header>

<div class="app">

  <!-- ── SIDEBAR ───────────────────────── -->
  <aside>

    <div class="filter-section">
      <div class="filter-label">Modality</div>
      <div id="filter-modality" class="chip-group"></div>
    </div>

    <div class="filter-section">
      <div class="filter-label">Cell Type</div>
      <div id="filter-cell" class="chip-group"></div>

      <label>
        <input type="checkbox" id="mixed-toggle">
        Include mixed
      </label>
    </div>

    <div class="filter-section">
      <div class="filter-label">Outcome</div>
      <div id="filter-outcome" class="chip-group"></div>
    </div>

    <div class="filter-section">
      <div class="filter-label">Model</div>
      <div id="filter-model" class="chip-group"></div>
    </div>

    <div class="filter-section">
      <div class="filter-label">Fold Change</div>
      <input type="range" id="fc-min" min="0" max="5" step="0.1">
      <input type="range" id="fc-max" min="0" max="5" step="0.1">
    </div>

  </aside>

  <!-- ── MAIN ──────────────────────────── -->
  <main>

    <div class="controls">
      <button class="source-btn active" data-source="all">All</button>
      <button class="source-btn" data-source="Burgess2026">Paper</button>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="scatter">Scatter</button>
      <button class="tab" data-tab="dose">Dose</button>
    </div>

    <div id="tab-scatter" class="panel">
      
      <div class="legend-controls">
        <button class="legend-btn active" data-color="modality">Modality</button>
        <button class="legend-btn" data-color="outcome">Outcome</button>
      </div>

      <div id="scatter-legend" class="legend"></div>
      <div class="chart-container">
  <div id="scatter-chart"></div>
</div>

    </div>

    <div id="tab-dose" class="panel hidden"></div>

  </main>

</div>

<div id="tooltip" class="tooltip"></div>

</body>
</html>
